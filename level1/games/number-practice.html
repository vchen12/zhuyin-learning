<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="../../manifest.json">
    <title>數字練習 (0-9)</title>
    <script src="../../js/config.js"></script>
    <script src="../../js/prevent-zoom.js" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
        }

        .nav-bar {
            flex-shrink: 0;
            background: rgba(255,255,255,0.95);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .back-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .back-btn:hover { transform: scale(1.05); }
        .score-display {
            font-size: 1.1rem;
            color: #667eea;
            font-weight: bold;
        }
        .score-label { font-size: 0.8rem; color: #888; }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            overflow: hidden;
        }

        .mode-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-btn {
            background: rgba(255,255,255,0.3);
            color: white;
            border: 2px solid white;
            padding: 14px 20px;
            border-radius: 20px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .mode-btn.active {
            background: white;
            color: #667eea;
            transform: scale(1.1);
        }

        .display-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        #numberDisplay {
            font-size: 5rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 4px 8px rgba(0,0,0,0.3);
            min-height: 100px;
        }

        #zhuyinDisplay {
            font-size: 2rem;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            min-height: 50px;
        }

        .progress-section {
            display: none;
            width: 100%;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            color: white;
        }

        .progress-text { margin-bottom: 8px; font-weight: bold; }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            width: 0%;
            transition: width 0.3s;
        }

        #numberGrid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
        }

        .number-card {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            gap: 5px;
        }

        .number-card:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.05);
        }

        .number-card.mastered {
            background: rgba(76,175,80,0.5);
            border-color: #4caf50;
        }

        .number-card .num {
            font-size: 2rem;
            font-weight: bold;
        }

        .number-card .zhuyin {
            font-size: 0.85rem;
        }

        #optionsGrid {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }

        .option-btn {
            background: rgba(255,255,255,0.3);
            color: white;
            border: 2px solid white;
            padding: 25px;
            border-radius: 15px;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .option-btn:hover {
            background: rgba(255,255,255,0.5);
            transform: scale(1.05);
        }

        .option-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .option-btn.correct {
            background: #4caf50;
            border-color: #4caf50;
            animation: pulse 0.5s;
        }

        .option-btn.wrong {
            background: #ff5252;
            border-color: #ff5252;
            animation: shake 0.5s;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .action-buttons {
            display: none;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            padding: 16px 28px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        #speakBtn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        #manualSpeakBtn {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #333;
        }

        #skipBtn {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: #333;
        }

        button:hover { transform: scale(1.05); }
        button:active { transform: scale(0.95); }

        #resultMessage {
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .listening {
            animation: listening-pulse 0.6s infinite;
        }

        @keyframes listening-pulse {
            0%, 100% { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
            50% { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        }

        #fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .firework {
            position: absolute;
            animation: firework-fall 2s ease-in forwards;
        }

        @keyframes firework-fall {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(500px) scale(0); }
        }

        .complete-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .complete-overlay.show {
            display: flex;
        }

        .complete-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .complete-card h2 { color: #667eea; font-size: 2rem; margin-bottom: 15px; }
        .complete-card p { color: #333; font-size: 1.5rem; margin-bottom: 30px; }
        .complete-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 40px;
            font-size: 1.1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }

        .complete-btn:hover { transform: scale(1.05); }

        @media (max-width: 768px) {
            #numberGrid { grid-template-columns: repeat(5, 1fr); }
            #numberDisplay { font-size: 3.5rem; }
            #zhuyinDisplay { font-size: 1.5rem; }
        }

        @media (max-width: 480px) {
            #numberGrid { grid-template-columns: repeat(5, 1fr); gap: 8px; }
            .number-card .num { font-size: 1.5rem; }
            .number-card .zhuyin { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <a href="../index.html" class="back-btn">← 返回</a>
        <div class="score-display">
            <div class="score-label">得分</div>
            <div id="score">0</div>
        </div>
    </div>

    <div class="main-container">
        <div class="mode-selector">
            <button class="mode-btn active" onclick="setMode('learn')">📚 學習</button>
            <button class="mode-btn" onclick="setMode('listen')">👂 聽音選數</button>
            <button class="mode-btn" onclick="setMode('speak')">🎤 看數唸出</button>
        </div>

        <div class="display-area">
            <div class="progress-section" id="progressSection">
                <div class="progress-text">第 <span id="currentRound">0</span> / <span id="totalRounds">10</span> 題</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <div id="numberDisplay">0</div>
            <div id="zhuyinDisplay">ㄌㄧㄥˊ</div>

            <div id="optionsGrid"></div>

            <div class="action-buttons" id="actionButtons">
                <button id="playBtn" onclick="playSound()" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">🔊 再聽一次</button>
            </div>

            <div id="numberGrid"></div>

            <div id="resultMessage"></div>

            <div class="action-buttons" id="speakActionButtons" style="display: none;">
                <button id="speakBtn" onclick="startListening()">🎤 我來唸</button>
                <button id="manualSpeakBtn" onclick="manualSpeakConfirm()" style="display: none;">✅ 我會唸</button>
                <button id="skipBtn" onclick="skipCurrentNumber()" style="display: none;">⏭️ 跳過</button>
            </div>
        </div>
    </div>

    <div class="complete-overlay" id="completeOverlay">
        <div class="complete-card">
            <h2>🎉 遊戲結束！</h2>
            <p id="completeScore">得分：0 分</p>
            <button class="complete-btn" onclick="restartGame()">🔄 再玩一次</button>
        </div>
    </div>

    <div id="fireworks"></div>

    <script src="../../js/speech-recognition.js"></script>
    <script>
        // 數字資料 (0-9)
        const NUMBERS = [
            { num: 0, zhuyin: 'ㄌㄧㄥˊ', text: '零' },
            { num: 1, zhuyin: 'ㄧ', text: '一' },
            { num: 2, zhuyin: 'ㄦˋ', text: '二' },
            { num: 3, zhuyin: 'ㄙㄢ', text: '三' },
            { num: 4, zhuyin: 'ㄙˋ', text: '四' },
            { num: 5, zhuyin: 'ㄨˇ', text: '五' },
            { num: 6, zhuyin: 'ㄌㄧㄡˋ', text: '六' },
            { num: 7, zhuyin: 'ㄑㄧ', text: '七' },
            { num: 8, zhuyin: 'ㄅㄚ', text: '八' },
            { num: 9, zhuyin: 'ㄐㄧㄡˇ', text: '九' }
        ];

        const ENCOURAGEMENTS = ['太棒了！', '好厲害！', '答對了！', '真聰明！', '很棒喔！', '太厲害了！'];

        // 取得使用者名稱
        function getUserName() {
            return localStorage.getItem('userName') || '';
        }

        // 取得帶名字的鼓勵語
        function getEncouragement() {
            const name = getUserName();
            const base = ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)];
            return name ? `${name}，${base}` : base;
        }

        let currentMode = 'learn';
        let currentNumber = null;
        let currentRound = 0;
        let totalRounds = 10;
        let score = 0;
        let questionQueue = [];
        let isProcessing = false;
        let masteredNumbers = new Set(JSON.parse(localStorage.getItem('masteredNumbers_0_9') || '[]'));

        // 語音合成
        let voicesLoaded = false;
        function loadVoices() {
            if ('speechSynthesis' in window) {
                const voices = window.speechSynthesis.getVoices();
                if (voices.length > 0) {
                    voicesLoaded = true;
                }
            }
        }

        // 初始化語音引擎
        if ('speechSynthesis' in window) {
            loadVoices();
            window.speechSynthesis.onvoiceschanged = loadVoices;
        }

        function speak(text, callback) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-TW';
                utterance.rate = 0.85;
                utterance.pitch = 1.1;

                const voices = window.speechSynthesis.getVoices();
                const zhVoice = voices.find(v => v.lang.includes('zh') || v.lang.includes('TW'));
                if (zhVoice) {
                    utterance.voice = zhVoice;
                }

                if (callback) {
                    utterance.onend = callback;
                    setTimeout(() => {
                        if (callback) callback();
                    }, 5000);
                }

                utterance.onerror = (e) => {
                    console.error('語音合成錯誤:', e);
                    if (callback) callback();
                };

                window.speechSynthesis.speak(utterance);
            } else if (callback) {
                callback();
            }
        }

        // 播放數字發音
        function playSound() {
            speak(currentNumber.text);
        }

        // 設定模式
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('optionsGrid').style.display = 'none';
            document.getElementById('progressSection').style.display = 'none';
            document.getElementById('numberGrid').style.display = mode === 'learn' ? 'grid' : 'none';
            document.getElementById('actionButtons').style.display = 'none';
            document.getElementById('speakActionButtons').style.display = 'none';
            document.getElementById('resultMessage').textContent = '';

            if (mode === 'learn') {
                document.getElementById('actionButtons').style.display = 'flex';
                renderNumberGrid();
                nextNumber();
                speak('學習模式！點擊數字聽發音，跟著唸一遍！');
            } else if (mode === 'listen') {
                startListenMode();
            } else if (mode === 'speak') {
                startSpeakMode();
            }
        }

        // 學習模式
        function renderNumberGrid() {
            const grid = document.getElementById('numberGrid');
            grid.innerHTML = '';

            NUMBERS.forEach(num => {
                const card = document.createElement('div');
                card.className = 'number-card';
                if (masteredNumbers.has(num.num)) {
                    card.classList.add('mastered');
                }
                card.innerHTML = `<div class="num">${num.num}</div><div class="zhuyin">${num.zhuyin}</div>`;
                card.onclick = () => {
                    currentNumber = num;
                    displayNumber();
                    playSound();
                };
                grid.appendChild(card);
            });
        }

        function nextNumber() {
            currentNumber = NUMBERS[Math.floor(Math.random() * NUMBERS.length)];
            displayNumber();
            setTimeout(playSound, 300);
        }

        function displayNumber() {
            document.getElementById('numberDisplay').textContent = currentNumber.num;
            document.getElementById('zhuyinDisplay').textContent = currentNumber.zhuyin;
        }

        // 聽音選數模式
        function startListenMode() {
            speak('聽音選數模式！', () => {
                setTimeout(() => {
                    speak('聽到數字發音後，選出正確的數字！準備好請點「確定」', () => {
                        if (confirm('🎮 聽音選數模式\n\n玩法：聽到數字發音後，選出正確的數字\n\n準備好了嗎？')) {
                            actuallyStartListenMode();
                        } else {
                            setMode('learn');
                        }
                    });
                }, 300);
            });
        }

        function actuallyStartListenMode() {
            currentRound = 0;
            score = 0;
            questionQueue = shuffle([...NUMBERS, ...NUMBERS]).slice(0, totalRounds);

            document.getElementById('progressSection').style.display = 'block';
            document.getElementById('optionsGrid').style.display = 'grid';
            document.getElementById('actionButtons').style.display = 'none';
            document.getElementById('speakActionButtons').style.display = 'none';

            updateScore();
            speak('開始！', () => {
                nextListenQuestion();
            });
        }

        function nextListenQuestion() {
            if (currentRound >= totalRounds) {
                endGame();
                return;
            }

            currentNumber = questionQueue[currentRound];
            currentRound++;

            document.getElementById('currentRound').textContent = currentRound;
            document.getElementById('progressFill').style.width = ((currentRound - 1) / totalRounds * 100) + '%';
            document.getElementById('numberDisplay').textContent = '?';
            document.getElementById('zhuyinDisplay').textContent = '聽發音選擇';
            document.getElementById('resultMessage').textContent = '';

            generateOptions();

            setTimeout(() => {
                speak(currentNumber.text);
            }, 500);
        }

        function generateOptions() {
            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = '';

            let options = [currentNumber];
            while (options.length < 4) {
                const rand = NUMBERS[Math.floor(Math.random() * NUMBERS.length)];
                if (!options.find(o => o.num === rand.num)) {
                    options.push(rand);
                }
            }
            options = shuffle(options);

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt.num;
                btn.onclick = () => checkAnswer(btn, opt);
                grid.appendChild(btn);
            });
        }

        function checkAnswer(btn, selected) {
            const isCorrect = selected.num === currentNumber.num;

            document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

            if (isCorrect) {
                btn.classList.add('correct');
                score += 10;
                updateScore();
                saveMastered(currentNumber.num);

                const encouragement = getEncouragement();
                document.getElementById('resultMessage').textContent = '✨ ' + encouragement + ' ✨';
                document.getElementById('numberDisplay').textContent = currentNumber.num;
                document.getElementById('zhuyinDisplay').textContent = currentNumber.zhuyin;

                if (navigator.vibrate) {
                    navigator.vibrate([100, 50, 100]);
                }
                btn.style.transform = 'scale(1.2)';
                setTimeout(() => { btn.style.transform = 'scale(1)'; }, 300);

                setTimeout(() => speak(encouragement), 500);
                createFireworks(20);

                setTimeout(nextListenQuestion, 2500);
            } else {
                btn.classList.add('wrong');
                document.getElementById('resultMessage').textContent = '再試一次！正確答案是 ' + currentNumber.num;
                speak('再試一次！正確答案是' + currentNumber.text);

                setTimeout(() => {
                    document.querySelectorAll('.option-btn').forEach(b => {
                        b.disabled = false;
                        b.classList.remove('wrong');
                    });
                }, 1500);
            }
        }

        // 看數唸出模式
        function startSpeakMode() {
            speak('看數唸出模式！', () => {
                setTimeout(() => {
                    speak('看到數字後，點麥克風大聲唸出來！準備好請點「確定」', () => {
                        if (confirm('🎤 看數唸出模式\n\n玩法：看到數字後，點麥克風大聲唸出來\n或點「✅我會唸」按鈕確認\n\n準備好了嗎？')) {
                            actuallyStartSpeakMode();
                        } else {
                            setMode('learn');
                        }
                    });
                }, 300);
            });
        }

        function actuallyStartSpeakMode() {
            currentRound = 0;
            score = 0;
            questionQueue = shuffle([...NUMBERS, ...NUMBERS]).slice(0, totalRounds);

            document.getElementById('progressSection').style.display = 'block';
            document.getElementById('optionsGrid').style.display = 'none';
            document.getElementById('actionButtons').style.display = 'none';
            document.getElementById('speakActionButtons').style.display = 'flex';
            document.getElementById('manualSpeakBtn').style.display = 'inline-block';
            document.getElementById('skipBtn').style.display = 'inline-block';

            updateScore();
            speak('開始！', () => {
                nextSpeakQuestion();
            });
        }

        function nextSpeakQuestion() {
            if (currentRound >= totalRounds) {
                endGame();
                return;
            }

            currentNumber = questionQueue[currentRound];
            currentRound++;

            document.getElementById('currentRound').textContent = currentRound;
            document.getElementById('progressFill').style.width = ((currentRound - 1) / totalRounds * 100) + '%';
            displayNumber();
            document.getElementById('resultMessage').textContent = '看到這個數字了嗎？點擊麥克風唸出來！';
        }

        // 使用 SpeechModule 開始聆聽
        async function startListening() {
            if (SpeechModule.isListening() || isProcessing) return;

            await SpeechModule.init();

            const speakBtn = document.getElementById('speakBtn');
            speakBtn.disabled = true;
            speakBtn.classList.add('listening');

            SpeechModule.startListening(currentNumber.text, {
                onVoiceDetected: () => {
                    if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
                },
                onInterim: (text) => {
                    document.getElementById('resultMessage').textContent = '🎤 聽到：' + text;
                },
                onResult: (result) => {
                    speakBtn.disabled = false;
                    speakBtn.classList.remove('listening');
                    if (result.passed) {
                        handleSpeakCorrect(result.similarity);
                    } else {
                        handleRecognitionFailed(currentNumber.text, result.transcript, result.similarity);
                    }
                },
                onTimeout: (info) => {
                    speakBtn.disabled = false;
                    speakBtn.classList.remove('listening');
                    if (info.hadVoice) {
                        document.getElementById('resultMessage').textContent = '🎤 聲音有點短，請再唸一次！';
                    } else {
                        document.getElementById('resultMessage').textContent = '沒聽清楚，點🎤再試，或點「✅我會唸」';
                    }
                },
                onError: (err) => {
                    speakBtn.disabled = false;
                    speakBtn.classList.remove('listening');
                    console.error('語音辨識錯誤:', err);
                    if (err === 'not-allowed' || err === 'audio-capture') {
                        document.getElementById('resultMessage').textContent = '❌ 麥克風無法使用，請點「✅我會唸」按鈕';
                    }
                }
            });
        }

        function manualSpeakConfirm() {
            speak(currentNumber.text, () => {
                if (confirm('你會唸「' + currentNumber.text + '」嗎？\n\n點「確定」表示會唸')) {
                    handleSpeakCorrect();
                } else {
                    document.getElementById('resultMessage').textContent = '沒關係，再聽一次！';
                    speak('沒關係，再聽一次！');
                }
            });
        }

        // 跳過當前數字
        function skipCurrentNumber() {
            SpeechModule.stopListening();
            isProcessing = false;

            document.getElementById('speakBtn').disabled = false;
            document.getElementById('speakBtn').classList.remove('listening');

            var correctText = currentNumber.text;
            document.getElementById('resultMessage').textContent = '正確答案：' + correctText;
            document.getElementById('resultMessage').style.color = '#ff9800';

            speak(correctText);

            setTimeout(function() {
                document.getElementById('resultMessage').style.color = 'white';
                nextSpeakQuestion();
            }, 2500);
        }

        // 辨識失敗後的回放流程
        async function handleRecognitionFailed(target, transcript, similarity) {
            if (SpeechModule.hasRecording()) {
                document.getElementById('resultMessage').textContent = '🔊 讓我們聽聽你的發音...';
                await new Promise(r => setTimeout(r, 500));
                await SpeechModule.playRecording();
                await new Promise(r => setTimeout(r, 300));
            }

            document.getElementById('resultMessage').textContent = '🔊 正確的發音是...';
            await new Promise(r => setTimeout(r, 300));
            await SpeechModule.speak(target);
            await new Promise(r => setTimeout(r, 500));

            document.getElementById('resultMessage').textContent = '再試一次！點🎤或點「✅我會唸」';
        }

        function handleSpeakCorrect(similarity = 100) {
            score += 10;
            updateScore();
            saveMastered(currentNumber.num);

            if (navigator.vibrate) {
                navigator.vibrate([100, 50, 100]);
            }

            const encouragement = getEncouragement();
            document.getElementById('resultMessage').textContent = '🎉 ' + encouragement + ' 🎉';

            speak(encouragement);
            createFireworks(20);

            setTimeout(nextSpeakQuestion, 2000);
        }

        // 工具函數
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        function saveMastered(num) {
            masteredNumbers.add(num);
            localStorage.setItem('masteredNumbers_0_9', JSON.stringify([...masteredNumbers]));
            renderNumberGrid();
        }

        function endGame() {
            document.getElementById('completeScore').textContent = `得分：${score} 分`;
            document.getElementById('completeOverlay').classList.add('show');
            createFireworks(50);
            speak(`太棒了！你得了${score}分！`);
        }

        function restartGame() {
            document.getElementById('completeOverlay').classList.remove('show');
            setMode(currentMode);
        }

        function createFireworks(count) {
            const container = document.getElementById('fireworks');
            const emojis = ['✨', '🎉', '🎊', '⭐', '💫', '🌟'];

            for (let i = 0; i < count; i++) {
                const firework = document.createElement('div');
                firework.className = 'firework';
                firework.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                firework.style.left = Math.random() * 100 + '%';
                firework.style.top = Math.random() * 100 + '%';
                firework.style.fontSize = (2 + Math.random() * 2) + 'rem';
                firework.style.animationDelay = Math.random() * 0.5 + 's';
                container.appendChild(firework);
            }
            setTimeout(() => { container.innerHTML = ''; }, 2000);
        }

        // 初始化
        function init() {
            renderNumberGrid();
            currentNumber = NUMBERS[0];
            displayNumber();
            setTimeout(() => {
                speak('歡迎來到數字練習！這裡練習數字零到九的發音。', () => {
                    setTimeout(() => speak('點擊下方的數字，聽發音跟著唸！'), 1000);
                });
            }, 500);
        }

        init();
    </script>
</body>
</html>
