<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="注音學習樂園">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="專為失語症患者與學齡前兒童設計的注音符號學習 App">
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-96.png">
    <title>🌟 注音符號學習樂園 🌟</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
            padding: 40px 20px;
        }
        .header h1 {
            font-size: 3.5rem;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            margin-bottom: 15px;
        }
        .header .subtitle {
            font-size: 1.5rem;
            opacity: 0.9;
        }
        .levels {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }
        .level-card {
            background: white;
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .level-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .level-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }
        .level-title {
            font-size: 2rem;
            color: #667eea;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .level-desc {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .level-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            margin-top: 10px;
        }
        .badge-beginner {
            background: #e8f5e9;
            color: #4caf50;
        }
        .badge-intermediate {
            background: #fff3e0;
            color: #ff9800;
        }
        .badge-advanced {
            background: #fce4ec;
            color: #e91e63;
        }
        .footer {
            text-align: center;
            color: white;
            padding: 30px;
            opacity: 0.8;
        }
        .footer a {
            color: white;
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.5rem;
            }
            .level-icon {
                font-size: 4rem;
            }
            .level-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌟 注音符號學習樂園 🌟</h1>
            <div class="subtitle">專為失語症患者與學齡前兒童設計</div>
        </div>
        
        <div class="levels">
            <!-- 第0關 -->
            <a href="level0/index.html" class="level-card">
                <div class="level-icon">📖</div>
                <div class="level-title">第0關：基礎認識</div>
                <div class="level-desc">
                    熟悉37個注音符號<br>
                    聽發音、跟著唸<br>
                    建立基礎認知
                </div>
                <span class="level-badge badge-beginner">入門級</span>
            </a>
            
            <!-- 第一關 -->
            <a href="level1/index.html" class="level-card">
                <div class="level-icon">🎯</div>
                <div class="level-title">第一關：射擊挑戰</div>
                <div class="level-desc">
                    語音辨識互動<br>
                    大聲唸出注音符號<br>
                    訓練精準發音
                </div>
                <span class="level-badge badge-intermediate">進階級</span>
            </a>
            
            <!-- 第二關 -->
            <a href="level2/index.html" class="level-card">
                <div class="level-icon">🖼️</div>
                <div class="level-title">第二關：圖片識字</div>
                <div class="level-desc">
                    看圖學單字<br>
                    注音+圖片+發音<br>
                    實用詞彙學習
                </div>
                <span class="level-badge badge-advanced">實戰級</span>
            </a>
        </div>
        
        <div class="footer">
            <p>音檔來源：教育部《國語注音符號手冊》</p>
            <p style="margin-top: 10px;">授權：創用CC 姓名標示 4.0 國際版本</p>
            <p style="margin-top: 20px; font-size: 0.9rem;">
                建議使用Chrome瀏覽器以獲得最佳體驗<br>
                iPad用戶：請點「分享」→「加入主畫面」
            </p>
        </div>
    </div>

    <script>
        // 註冊 Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('SW 註冊成功:', reg.scope))
                    .catch(err => console.log('SW 註冊失敗:', err));
            });
        }

        // PWA 安裝提示
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // 可以在這裡顯示「安裝 App」按鈕
        });

        // 防止頁面縮放
        document.addEventListener('gesturestart', function(e) {
            e.preventDefault();
        });
        
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
    </script>
</body>
</html>
